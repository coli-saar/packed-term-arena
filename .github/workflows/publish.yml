name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      # GitHub-hosted runners occasionally see HTTP/2 framing failures while
      # updating the sparse crates.io index. Cargo retries transient requests,
      # and disabling multiplexing avoids the affected HTTP/2 code path.
      CARGO_HTTP_MULTIPLEXING: "false"
      CARGO_HTTP_TIMEOUT: "120"
      CARGO_NET_RETRY: "10"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify package name and tag
        shell: bash
        run: |
          metadata="$(cargo metadata --no-deps --format-version 1)"
          crate_name="$(python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["name"])' <<<"${metadata}")"
          crate_version="$(python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])' <<<"${metadata}")"
          test "${crate_name}" = "packed-term-arena"
          test "${GITHUB_REF_NAME}" = "v${crate_version}"

      - name: Fetch dependencies
        shell: bash
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              echo "Attempt ${attempt} failed; retrying..."
              sleep "$((attempt * 10))"
            done
            return 1
          }

          retry cargo fetch --locked

      - name: Test all targets
        run: cargo test --all-targets --locked

      - name: Verify package
        shell: bash
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              echo "Attempt ${attempt} failed; retrying..."
              sleep "$((attempt * 10))"
            done
            return 1
          }

          retry cargo publish --dry-run --locked

      - name: Publish package
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
