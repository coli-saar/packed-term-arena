name: Publish crate

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify package name and tag
        shell: bash
        run: |
          metadata="$(cargo metadata --no-deps --format-version 1)"
          crate_name="$(python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["name"])' <<<"${metadata}")"
          crate_version="$(python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])' <<<"${metadata}")"
          test "${crate_name}" = "packed-term-arena"
          test "${GITHUB_REF_NAME}" = "v${crate_version}"

      - name: Test all targets
        run: cargo test --all-targets --locked

      - name: Verify package
        run: cargo publish --dry-run --locked

      - name: Publish package
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
